<svg width="100%" viewBox="0 0 680 370" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="skyC"><rect x="0" y="0" width="680" height="222"/></clipPath>
    <style>
      @keyframes weatherCycle{0%,18%{opacity:1}28%{opacity:0}72%{opacity:0}82%{opacity:1}100%{opacity:1}}
      @keyframes cloudCover{0%,22%{opacity:0}35%{opacity:1}65%{opacity:1}78%{opacity:0}100%{opacity:0}}
      @keyframes rainShow{0%,33%{opacity:0}43%{opacity:1}60%{opacity:1}70%{opacity:0}100%{opacity:0}}
      @keyframes drift1{0%,100%{transform:translateX(0)}50%{transform:translateX(22px)}}
      @keyframes drift2{0%,100%{transform:translateX(0)}50%{transform:translateX(-16px)}}
      @keyframes sunpulse{0%,100%{opacity:1}50%{opacity:.86}}
      @keyframes raindrop{0%{transform:translateY(0);opacity:.8}100%{transform:translateY(30px);opacity:0}}
      @keyframes sway{0%,100%{transform-origin:88px 218px;transform:rotate(-1deg)}50%{transform-origin:88px 218px;transform:rotate(1deg)}}
      @keyframes bare{0%{opacity:1}4%{opacity:0}92%{opacity:0}96%{opacity:1}100%{opacity:1}}
      @keyframes foliage{0%{opacity:0}6%{opacity:1}88%{opacity:1}94%{opacity:0}100%{opacity:0}}
      @keyframes blossom{0%,22%{opacity:0}30%{opacity:1}48%{opacity:1}56%{opacity:0}100%{opacity:0}}
      @keyframes fruit{0%,52%{opacity:0}60%{opacity:1}88%{opacity:1}94%{opacity:0}100%{opacity:0}}
      @media(prefers-reduced-motion:reduce){*{animation:none!important}}
      .DUR{animation-duration:36s;animation-iteration-count:infinite;animation-timing-function:ease-in-out}
      .cloud1{animation:drift1 11s ease-in-out infinite}
      .cloud2{animation:drift2 15s ease-in-out infinite}
      .sun-g{animation:weatherCycle 36s ease-in-out infinite,sunpulse 4s ease-in-out infinite}
      .covercloud{animation:cloudCover 36s ease-in-out infinite}
      .raingroup{animation:rainShow 36s ease-in-out infinite}
      .r1{animation:raindrop 1.3s linear infinite 0s}
      .r2{animation:raindrop 1.3s linear infinite .18s}
      .r3{animation:raindrop 1.3s linear infinite .36s}
      .r4{animation:raindrop 1.3s linear infinite .54s}
      .r5{animation:raindrop 1.3s linear infinite .72s}
      .r6{animation:raindrop 1.3s linear infinite .9s}
      .r7{animation:raindrop 1.3s linear infinite .12s}
      .r8{animation:raindrop 1.3s linear infinite .45s}
      .r9{animation:raindrop 1.3s linear infinite .63s}
      .sway{animation:sway 6s ease-in-out infinite}
      .bare-layer{animation:bare 36s ease-in-out infinite}
      .foliage-layer{animation:foliage 36s ease-in-out infinite}
      .blossom-layer{animation:blossom 36s ease-in-out infinite}
      .fruit-layer{animation:fruit 36s ease-in-out infinite}
    </style>
  </defs>

